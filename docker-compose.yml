services:
  mysql:
    image: mysql:8.0
    container_name: aegisai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aegisai
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"          # 映射到主机3307，避免与本地MySQL冲突
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --lower_case_table_names=1
    volumes:
      - mysql-data:/var/lib/mysql
      - ./aegisai.sql:/docker-entrypoint-initdb.d/001-legacy-base.sql:ro
      - ./docker/mysql/bootstrap/001-latest-compat.sql:/docker-entrypoint-initdb.d/002-latest-compat.sql:ro
      - ./docker/mysql/bootstrap/002-themed-seed.sql:/docker-entrypoint-initdb.d/003-themed-seed.sql:ro
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:6.2
    container_name: aegisai-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass root
    volumes:
      - redis-data:/data
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: aegisai-es
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 10

  ai-inference:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: ai-inference
    restart: always
    ports:
      - "5000:5000"
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: aegisai-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123456
      RABBITMQ_DEFAULT_VHOST: /aegisai
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-bootstrap:
    image: mysql:8.0
    container_name: aegisai-mysql-bootstrap
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./docker/mysql/bootstrap:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap.sh"]
    networks:
      - aegisai-network

  aegisai-backend:
    build: .                     # 使用根目录的 Dockerfile（后端）
    container_name: aegisai-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aegisai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: root
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: 123456
      SPRING_RABBITMQ_VIRTUAL_HOST: /aegisai
      AI_INFERENCE_URL: http://ai-inference:5000
      AI_AES_KEY: "12345678901234567890123456789012"
    depends_on:
      mysql:
        condition: service_healthy
      mysql-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-inference:
        condition: service_started
    networks:
      - aegisai-network

  aegisai-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://aegisai-backend:8080   # 容器内访问后端
    container_name: aegisai-frontend
    restart: always
    ports:
      - "80:80"                  # 访问 http://localhost 即可
    depends_on:
      - aegisai-backend
    networks:
      - aegisai-network

networks:
  aegisai-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  es-data:
  rabbitmq-data: