server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aegisai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
elasticsearch:
  host: localhost
  port: 9200
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
logging:
  level:
    com.trustai: debug

ai:
  security:
    # 32 字节 AES Key，请在生产环境使用安全值
    aes-key: please-change-this-32-bytes-key-1234
  routing:
    # 默认 system prompt，可按需扩展
    default-system-prompt: "你是一个安全合规的企业助手，回答需脱敏且遵守中国法律。"
