server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:aegisai}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 完全注释 Redis ↓
  # redis:
  #   host: ${REDIS_HOST:redis}
  #   port: ${REDIS_PORT:6379}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
# 完全注释 ES ↓
# elasticsearch:
#   host: ${ES_HOST:elasticsearch}
#   port: ${ES_PORT:9200}
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
logging:
  level:
    com.trustai: debug

ai:
  security:
   aes-key: ${AI_AES_KEY:12345678901234567890123456789012}
  routing:
   default-system-prompt: "你是一个安全合规的企业助手，回答需脱敏且遵守中国法律。"