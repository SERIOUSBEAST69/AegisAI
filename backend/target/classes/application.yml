server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:mem:aegisai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db-h2.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
logging:
  level:
    com.trustai: debug

ai:
  security:
   aes-key: ${AI_AES_KEY:12345678901234567890123456789012}
  routing:
   default-system-prompt: "你是一个安全合规的企业助手，回答需脱敏且遵守中国法律。"
