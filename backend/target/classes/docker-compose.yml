version: '3.8'

services:
  # 1. MySQL 容器
  mysql:
    image: mysql:8.0
    container_name: aegisai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root                # 改为 root
      MYSQL_DATABASE: aegisai
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./aegisai.sql:/docker-entrypoint-initdb.d/aegisai.sql
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]   # 密码改为 root
      interval: 5s
      timeout: 10s
      retries: 10

  # 2. Redis 容器
  redis:
    image: redis:7.0
    container_name: aegisai-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass root    # 密码改为 root
    volumes:
      - redis-data:/data
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]   # 密码改为 root
      interval: 5s
      timeout: 10s
      retries: 10

  # 3. Elasticsearch 容器
  es:
    image: elasticsearch:8.14.0
    container_name: aegisai-es
    restart: always
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "TZ=Asia/Shanghai"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - aegisai-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 10

  # 4. 应用容器
  aegisai-backend:
    build: .
    container_name: aegisai-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aegisai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root          # 改为 root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: root               # 改为 root
      SPRING_ELASTICSEARCH_URIS: http://es:9200
      AI_AES_KEY: 12345678901234567890123456789012
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      es:
        condition: service_healthy
    networks:
      - aegisai-network

networks:
  aegisai-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  es-data: